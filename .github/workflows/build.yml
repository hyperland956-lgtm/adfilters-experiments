name: Build Filter Lists

on:
  # Manual trigger - run anytime from the Actions tab
  workflow_dispatch:

  # Scheduled: every Sunday at 03:00 UTC
  # Free tier has 2000 min/month. This uses ~3-5 min/week = ~20 min/month.
  # Change "0 3 * * 0" to "0 3 * * *" for daily if you upgrade or have budget.
  schedule:
    - cron: "0 3 * * 0"

  # Also rebuild whenever config or scripts change
  push:
    branches:
      - main
    paths:
      - "config.yml"
      - "scripts/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run build
        run: python3 scripts/build.py

      - name: Commit and push outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: rebuild filter lists $(date -u +%Y-%m-%d)"
            git push
          fi
